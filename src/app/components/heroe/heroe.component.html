<div style="position: relative;">
    <app-language-selector></app-language-selector>
  
    <h1>{{ t('hero.title') }} <small>{{ t('hero.heroName') }}</small> </h1>
    <hr>
  
    <div class="row text-right">
        <div class="col">
            <button class="btn btn-danger" routerLink="/heroes">
                <i class="fa fa-arrow-left"></i>
                {{ t('hero.back') }}
            </button>
        </div>
    </div>
  
    <div class="row animated fadeIn faster">
        <div class="col">
            <form (ngSubmit)="guardar(f)" #f="ngForm">
  
                <div class="form-group">
                    <label>{{ t('hero.firebaseId') }}</label>
                    <input type="text" class="form-control" placeholder="Firebase ID" [(ngModel)]="heroe.id" name="id" disabled="disabled">
                    <small class="form-text text-muted">{{ t('hero.autoGenerated') }}</small>
                </div>
  
                <div class="form-group">
                    <label>{{ t('hero.name') }}</label>
                    <input type="text" class="form-control" [placeholder]="t('hero.namePlaceholder')" [(ngModel)]="heroe.nombre" name="nombre" required>
                </div>
  
                <div class="form-group">
                    <label>{{ t('hero.power') }}</label>
                    <input type="text" class="form-control" [(ngModel)]="heroe.poder" name="poder" [placeholder]="t('hero.powerPlaceholder')">
                </div>
  
                <div class="form-group">
                    <label>{{ t('hero.state') }}</label>
                    <br>
                    <button *ngIf="heroe.vivo" (click)="heroe.vivo = false" class="btn btn-outline-success w-50" type="button">
                        <i class="fa fa-smile-wink"></i>
                        {{ t('status.alive') }}
                    </button>
  
                    <button *ngIf="!heroe.vivo" (click)="heroe.vivo = true" class="btn btn-outline-danger w-50" type="button">
                        <i class="fa fa-dizzy"></i>
                        {{ t('status.dead') }}
                    </button>
                </div>
  
                <hr>
                <div class="form-group text-center">
                    <button type="submit" class="btn btn-primary w-25">
                        <i class="fa fa-save"></i>
                        {{ t('hero.save') }}
                    </button>
                </div>
            </form>
        </div>
    </div>
  </div>
