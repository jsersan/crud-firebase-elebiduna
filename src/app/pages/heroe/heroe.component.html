<div style="position: relative;">
    <app-language-selector></app-language-selector>

    <h1>{{ heroeTitle }} <small>{{ heroeSubtitle }}</small> </h1>
    <hr>

    <div class="row text-right">
        <div class="col">
            <button class="btn btn-danger" routerLink="/heroes">
          <i class="fa fa-arrow-left"></i>
          {{ heroeBack }}
        </button>
        </div>
    </div>

    <div class="row animated fadeIn faster">
        <div class="col">

            <form (ngSubmit)="guardar( f )" #f="ngForm">

                <div class="form-group">
                    <label>{{ heroeFirebaseId }}</label>
                    <input type="text" class="form-control" [placeholder]="heroeFirebaseId" [(ngModel)]="heroe.id" name="id" disabled="disabled">
                    <small class="form-text text-muted">{{ heroeAutoGenerated }}</small>
                </div>

                <div class="form-group">
                    <label>{{ heroeName }}</label>
                    <input type="text" class="form-control" [placeholder]="heroeNamePlaceholder" [(ngModel)]="heroe.nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label>{{ heroePower }}</label>
                    <input type="text" class="form-control" [(ngModel)]="heroe.poder" name="poder" [placeholder]="heroePowerPlaceholder">
                </div>

                <div class="form-group">
                    <label>{{ heroeState }}</label>
                    <br>
                    <button *ngIf="heroe.vivo" (click)="heroe.vivo = false" class="btn btn-outline-success w-50" type="button">
              <i class="fa fa-smile-wink"></i>
              {{ statusAlive }}
            </button>

                    <button *ngIf="!heroe.vivo" (click)="heroe.vivo = true" class="btn btn-outline-danger w-50" type="button">
                    <i class="fa fa-dizzy"></i>
                    {{ statusDead }}
                </button>

                </div>

                <hr>
                <div class="form-group text-center">
                    <button type="submit" class="btn btn-primary w-25">
                        <i class="fa fa-save"></i>
                        {{ heroeSave }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
